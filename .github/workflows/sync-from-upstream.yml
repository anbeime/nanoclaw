name: Sync from Upstream (nanobot)

on:
  # 定时同步上游仓库（每天凌晨1点）
  schedule:
    - cron: '0 1 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Sync with upstream
        run: |
          # 配置 Git
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 添加上游仓库
          git remote add upstream https://github.com/HKUDS/nanobot.git || true
          
          # 获取上游更新
          git fetch upstream
          
          # 合并上游的主分支
          git checkout main || git checkout master
          CURRENT_BRANCH=$(git branch --show-current)
          
          # 尝试合并上游更新
          git merge upstream/${CURRENT_BRANCH} --no-edit || {
            echo "⚠️ Merge conflict detected, using upstream version"
            git merge upstream/${CURRENT_BRANCH} -X theirs --no-edit
          }
          
          # 推送到你的 fork
          git push origin ${CURRENT_BRANCH}
          
          echo "✅ Successfully synced from upstream HKUDS/nanobot!"
