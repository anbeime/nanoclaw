name: Sync to Gitee (nanobot)

on:
  # 当有新的推送到主分支时触发
  push:
    branches:
      - master
      - main
  
  # 定时同步（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          # 配置 Git
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          # 检查当前分支
          CURRENT_BRANCH=$(git branch --show-current)
          echo "Current branch: $CURRENT_BRANCH"
          
          # 添加 Gitee 远程仓库（使用 token 认证）
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/anbeime/moltbot.git || true
          
          # 推送当前分支到 Gitee
          git push gitee ${CURRENT_BRANCH}:${CURRENT_BRANCH} --force
          
          # 推送所有标签到 Gitee
          git push gitee --tags --force || echo "No tags to push"
          
          echo "✅ Successfully synced nanobot to Gitee!"
